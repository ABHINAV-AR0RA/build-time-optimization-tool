<!DOCTYPE html>
<html>

<head>

<title>Build Time Optimization Tool</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<h1>Build Time Optimization Tool</h1>

<p class="subtitle">
Build and test projects automatically using Jenkins CI
</p>

<div class="card">

<label>GitHub Repository</label>

<input type="text" id="repo" placeholder="Paste GitHub repository URL">


<div class="divider">OR</div>
            
            
<label>Upload Project (ZIP)</label>
            
<input type="file" id="file">
<button type="button" onclick="clearFile()">
Remove file (use default)
</button>
            
<p class="hint">
If nothing is provided, or you select default below, the <b>sample-app</b> will be built.
</p>



<button class="primary" onclick="runBuild()">
BUILD PROJECT
</button>

</div>


<div class="status-card">

<h3>Live Build Status</h3>

<div class="status-box">

<div class="status-row">
<span>Status</span>
<span id="status-text">Waiting</span>
</div>

<div class="status-row">
<span>Building</span>
<span id="building-text">false</span>
</div>

<div class="status-row">
<span>Duration</span>
<span id="duration-text">0 ms</span>
</div>

</div>

</div>

</div>


<script>

async function runBuild(){

console.log("runBuild called")

document.getElementById("status-text").innerText="BUILDING..."
document.getElementById("building-text").innerText="true"

const repo=document.getElementById("repo").value
const file=document.getElementById("file").files[0]
const forceDefault=document.getElementById("force-default")?.checked

try{
  let res

  if(forceDefault){
    res = await fetch("http://localhost:3000/build/default",{
      method:"POST"
    })
  }

  else if(repo){
    res = await fetch("http://localhost:3000/build/github",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({repo})
    })
  }

  else if(file){
    const formData=new FormData()
    formData.append("project",file)

    res = await fetch("http://localhost:3000/build/upload",{
      method:"POST",
      body:formData
    })
  }

  else{
    res = await fetch("http://localhost:3000/build/default",{
      method:"POST"
    })
  }

  if(res.ok){
    alert("Jenkins build has been triggered successfully.")
  }else{
    const text = await res.text()
    alert("Failed to trigger Jenkins build: " + text)
  }

}catch(err){
  console.error("Build trigger error:",err)
  alert("Error contacting backend: " + err.message)
}

}



async function checkStatus(){

try{

const res = await fetch("http://localhost:3000/status")

if(!res.ok){
return
}

const data = await res.json()

document.getElementById("status-text").innerText = data.status || "UNKNOWN"
document.getElementById("building-text").innerText = data.building
document.getElementById("duration-text").innerText = data.duration + " ms"

}catch(err){

console.log("Status polling error:",err)

}

}


setInterval(checkStatus,3000)

function clearFile(){
const fileInput=document.getElementById("file")
if(fileInput){
  fileInput.value=""
}
const checkbox=document.getElementById("force-default")
if(checkbox){
  checkbox.checked=true
}
}

// Ensure functions are available on window for the onclick attributes
window.runBuild = runBuild
window.clearFile = clearFile

</script>

</body>

</html>
